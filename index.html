<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vercel Deploy Uploader</title>
  <style>
    :root{
      --bg:#070816; --card:rgba(15,18,40,.78); --line:rgba(255,255,255,.12);
      --text:#eef2ff; --muted:#a6aed8; --a:#7c5cff; --b:#22d3ee;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; font-family:system-ui,sans-serif; color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,92,255,.25), transparent 35%),
        radial-gradient(circle at top right, rgba(34,211,238,.18), transparent 30%),
        linear-gradient(180deg,#04050c 0%,#070816 100%);
      display:grid; place-items:center; padding:24px;
    }
    .wrap{width:min(900px,100%); display:grid; gap:18px}
    .hero,.panel{
      background:var(--card); border:1px solid var(--line); border-radius:24px;
      box-shadow:0 24px 80px rgba(0,0,0,.45); backdrop-filter:blur(18px)
    }
    .hero{padding:28px}
    .hero h1{margin:0 0 10px; font-size:clamp(32px,6vw,56px); line-height:1}
    .hero p{margin:0; color:var(--muted); line-height:1.7}
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:18px}
    .panel{padding:22px}
    label{display:block; margin:14px 0 8px; color:var(--muted); font-size:14px}
    input,textarea,button{
      width:100%; border-radius:16px; border:1px solid var(--line);
      background:rgba(255,255,255,.05); color:var(--text); padding:14px 16px; font:inherit
    }
    textarea{min-height:220px; resize:vertical}
    button{
      cursor:pointer; margin-top:16px; border:none;
      background:linear-gradient(135deg,var(--a),var(--b)); font-weight:700
    }
    .log{
      min-height:220px; white-space:pre-wrap; font-family:ui-monospace,monospace;
      color:#c9d2ff; background:rgba(0,0,0,.22); padding:16px; border-radius:16px;
      border:1px solid var(--line)
    }
    @media (max-width: 820px){ .grid{grid-template-columns:1fr} }
    a{color:#8ee7ff}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Upload file, deploy, lalu dapat URL</h1>
      <p>Web ini kirim isi file HTML ke Express backend. Backend akan mengirim file ke Vercel, membuat deployment, lalu menampilkan link hasilnya.</p>
    </section>

    <div class="grid">
      <section class="panel">
        <label>Nama project deploy</label>
        <input id="name" value="nexa-studio" />
        <label>File HTML</label>
        <textarea id="html"><!DOCTYPE html>
<html>
  <body style="font-family:sans-serif">
    <h1>Hello from Nexa Studio</h1>
  </body>
</html></textarea>
        <button onclick="deploy()">Deploy ke Vercel</button>
      </section>

      <section class="panel">
        <h3>Status</h3>
        <div id="log" class="log">Siap. Klik Deploy untuk mulai.</div>
      </section>
    </div>
  </div>

  <script>
    const log = (t) => document.getElementById('log').textContent = t;

    async function deploy() {
      const name = document.getElementById('name').value.trim();
      const html = document.getElementById('html').value;

      log('Mengirim file ke backend...');

      try {
        const res = await fetch('/deploy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, html })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Deploy gagal');

        log('Berhasil deploy.

URL deployment:
' + data.deploymentUrl);
      } catch (err) {
        log('Error: ' + err.message);
      }
    }
  </script>
</body>
</html>
